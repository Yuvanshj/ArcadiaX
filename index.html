<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcadiaX Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./CSS/dashboard.css">
    
    <!-- Inline simple SVG definition cache to keep HTML clean -->
    <svg style="display:none;">
        <defs>
            <symbol id="icon-xbox" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle><path d="M6 12l4-4-4-4"></path><path d="M18 12l-4-4 4-4"></path>
            </symbol>
            <symbol id="icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>
            </symbol>
            <symbol id="icon-library" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </symbol>
            <symbol id="icon-friends" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </symbol>
            <symbol id="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </symbol>
            <symbol id="icon-bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </symbol>
            <symbol id="icon-controller" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="6" width="20" height="12" rx="2" ry="2"></rect><path d="M12 12h.01"></path><path d="M17 12h.01"></path><path d="M7 12h.01"></path>
            </symbol>
        </defs>
    </svg>
</head>
<body>
    <div class="app-container">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-top">


                <nav class="main-nav">
                    <a href="#" class="nav-item active">
                        <svg class="icon"><use href="#icon-home"></use></svg>
                        <span>Home</span>
                    </a>

                </nav>
                



            </div>
            

        </aside>

        <!-- Main Content Area -->
        <main class="main-workspace">
            
            <!-- Dynamic Background -->
            <div class="hero-background">
                <img src="./assets/MainBg.png" alt="Hero Background">
                <div class="hero-overlay"></div>
            </div>

            <div class="scroll-container">
                <!-- Top Header -->
                <header class="top-header">
                    <div class="search-box">
                        <svg class="icon-small"><use href="#icon-search"></use></svg>
                        <input type="text" placeholder="Search for games, people, and more...">
                    </div>

                </header>

                <div class="content-padding">
                    <!-- Jump back in section -->
                    <section class="game-lane">
                        <h2 class="lane-title">Jump back in</h2>
                        <div class="cards-grid">
                            
                            <!-- Game Card 1 (Active) -->
                            <a href="pokemon.html" class="game-card focusable">
                                <img src="./assets/pokemon_cover.png" alt="Who's that Pokemon" class="card-art">
                                <div class="card-gradient"></div>
                                <div class="card-footer">
                                    <h3 class="game-title">Who's That Pokémon?</h3>
                                    <div class="card-icons">
                                        <svg class="icon-tiny text-success" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                                        <svg class="icon-tiny opacity-50"><use href="#icon-controller"></use></svg>
                                    </div>
                                </div>
                            </a>

                            <!-- Game Card 2 (Active Trivia) -->
                            <a href="trivia.html" class="game-card focusable">
                                <img src="./assets/trivia_cover.png" alt="Trivia Cover" class="card-art">
                                <div class="card-gradient"></div>
                                <div class="card-footer">
                                    <h3 class="game-title">Guess & Learn Trivia</h3>
                                    <div class="card-icons">
                                        <svg class="icon-tiny text-success" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                                        <svg class="icon-tiny opacity-50"><use href="#icon-controller"></use></svg>
                                    </div>
                                </div>
                            </a>

                            <!-- Game Card 3 (Coming Soon) -->
                            <div class="game-card locked focusable">
                                <div class="placeholder-art" style="background: linear-gradient(135deg, #00DFD8, #007CF0);">
                                    <span class="emoji">🏎️</span>
                                </div>
                                <div class="card-gradient"></div>
                                <div class="card-footer">
                                    <h3 class="game-title">Neon Drift</h3>
                                    <div class="card-icons">
                                        <span class="text-xs opacity-50">Coming Soon</span>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Game Card 4 (Coming Soon) -->
                            <div class="game-card locked focusable">
                                <div class="placeholder-art" style="background: linear-gradient(135deg, #F5A623, #FF4E50);">
                                    <span class="emoji">⚔️</span>
                                </div>
                                <div class="card-gradient"></div>
                                <div class="card-footer">
                                    <h3 class="game-title">Arcadia Fighters</h3>
                                    <div class="card-icons">
                                        <span class="text-xs opacity-50">Coming Soon</span>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </section>


                </div>
            </div>
        </main>
    </div>
</body>
</html>
