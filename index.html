<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Pokemon</title>
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
    <h1>Who's That Pokémon?</h1>
    <h1 id="pokemonName"></h1>
    
    <div class="container">
        <img alt="Who's that Pokemon?" id="pokemonsilhouette" class="pokemon-silhouette" draggable="false" oncontextmenu="return false;">
        <button class="btn btn-reveal" onclick="revealPokemon()">Reveal Pokémon</button>
        <button class="btn btn-next" onclick="startGame()">Next Pokémon</button>
    </div>

    <script src="./JS/Pokemon.js"></script>
</body>
</html>
